<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Siswa</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">

  <style>
    @media (max-width: 768px) {
      /* Paksa kontainer sidebar bawaan html agar tidak memakan space desktop */
      #sidebar-container {
        display: none !important;
      }
      
      /* Pastikan elemen .sidebar di dalamnya (jika disuntik JS) juga ikut sembunyi */
      .sidebar {
        display: none !important;
      }

      /* Buat konten utama memenuhi layar HP Anda */
      .main {
        padding: 14px !important;
        width: 100% !important;
        margin-left: 0 !important;
      }

      /* Opsional: Merapikan header-container di hp agar tidak pecah */
      #header-container .header {
        padding: 12px 14px !important;
        flex-direction: row;
        justify-content: space-between;
      }
      
      .user-info span {
        display: none !important; /* Sembunyikan nama panjang user di HP */
      }
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div id="sidebar-container"></div>

  <div class="main">

    <div id="header-container"></div>

    <div class="card">

      <div class="page-title">📚 Materi Saya</div>

      <input 
        type="text"
        id="searchMaterialSiswa"
        placeholder="Cari materi..."
        oninput="filterMaterialsSiswa()"
      >

      <div id="materialSiswaList"></div>

    </div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="./materials-siswa.js"></script>

</body>
</html>
