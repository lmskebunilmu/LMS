<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Kelas</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
</head>

<body>

<div class="wrapper">
  <div id="sidebar-container"></div>
  <div class="main">
    <div id="header-container"></div>

    <div class="card">
      <h1>Data Kelas</h1>

      <button class="btn-add" onclick="openClassModal()">
        ➕ Tambah Kelas
      </button>
      <button class="btn-export" onclick="exportClassesExcel()">💾 Export Excel</button>
      <button class="btn-export" onclick="exportClassesPDF()">📄 Export PDF</button>
      <input type="text" id="classSearch" placeholder="🔍 Cari kelas..." autocomplete="off">

      <table>
        <thead>
          <tr>
            <th>Nama Kelas</th>
            <th>Jumlah Guru</th>
            <th>Jumlah Siswa</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="classTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="classModal" class="modal">
  <div class="modal-content">
    <h3 id="classModalTitle">Tambah Kelas</h3>
    <input type="hidden" id="classId">
    <input type="text" id="className" placeholder="Nama Kelas"/>

    <select id="teacherSelect" multiple>
      <option value="">Pilih Guru</option>
    </select>

    <div class="modal-actions">
      <button class="primary" onclick="saveClass()">Simpan</button>
      <button class="danger" onclick="closeClassModal()">Batal</button>
    </div>
  </div>
</div>

<!-- MODAL: LIHAT DAFTAR SISWA -->
<div id="studentModal" class="modal">
  <div class="modal-content">
    <h3 id="studentModalTitle">Daftar Siswa</h3>
    <div class="bulk-actions" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
  <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
    <input type="checkbox" id="selectAllStudents" onclick="toggleSelectAll('studentList', this)"> <b>Pilih Semua</b>
  </label>
  <button class="btn-info" onclick="openAddStudentModal()" style="background-color: #10b981; color: white;">➕ Masukkan Siswa Baru</button>
  <button class="btn-warning" onclick="moveSelectedStudents()" style="background-color: #6366f1; color: white;">🔄 Pindahkan Kelas</button>
  <button class="btn-warning" onclick="removeSelectedStudents()">Keluarkan Terpilih</button>
  <button class="btn-delete" onclick="removeAllStudents()">Keluarkan Semua</button>
</div>
    <input type="text" id="studentSearch" placeholder="🔍 Cari siswa..." onkeyup="filterStudents()">
    
    <ul id="studentList" style="list-style: none; padding: 0; margin: 15px 0; max-height: 250px; overflow-y: auto;">
      <li>Memuat...</li>
    </ul>
    
    <div class="modal-actions">
      <button class="danger" onclick="closeStudentModal()">Tutup</button>
    </div>
  </div>
</div>

<!-- MODAL: LIHAT DAFTAR GURU -->
<div id="teacherModal" class="modal">
  <div class="modal-content">
    <h3 id="teacherModalTitle">Daftar Guru</h3>
    <div class="bulk-actions" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
      <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
        <input type="checkbox" id="selectAllTeachers" onclick="toggleSelectAll('teacherList', this)"> <b>Pilih Semua</b>
      </label>
      <button class="btn-info" onclick="openAddTeacherModal()" style="background-color: #10b981; color: white; border:none; padding: 6px 12px; border-radius:4px; cursor:pointer;">➕ Masukkan Guru Baru</button>
      
      <button class="btn-warning" onclick="removeSelectedTeachers()">Keluarkan Terpilih</button>
      <button class="btn-delete" onclick="removeAllTeachers()">Keluarkan Semua</button>
    </div>
    <input type="text" id="teacherSearch" placeholder="🔍 Cari guru..." onkeyup="filterTeachers()">
    
    <ul id="teacherList" style="list-style: none; padding: 0; margin: 15px 0; max-height: 250px; overflow-y: auto;">
      <li>Memuat...</li>
    </ul>
    
    <div class="modal-actions">
      <button class="danger" onclick="closeTeacherModal()">Tutup</button>
    </div>
  </div>
</div>

<div id="deleteConfirmModal" class="modal">
  <div class="modal-content" style="text-align: center; max-width: 400px;">
    <div style="font-size: 50px; color: #ef4444; margin-bottom: 10px;">⚠️</div>
    <h3>Hapus Kelas?</h3>
    <p id="deleteModalMessage" style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Apakah Anda yakin ingin menghapus kelas ini?</p>
    <div class="modal-actions" style="justify-content: center; gap: 10px;">
      <button id="confirmDeleteBtn" class="danger" style="background-color: #ef4444; color: white;">Ya, Hapus</button>
      <button class="secondary" onclick="closeDeleteModal()" style="background-color: #e2e8f0; color: #334155;">Batal</button>
    </div>
  </div>
</div>

<div id="addStudentModal" class="modal">
  <div class="modal-content">
    <h3>Pilih Siswa</h3>
    <div class="bulk-actions">
      <label>
        <input type="checkbox" onclick="toggleAllAddStudents(this)"> Pilih Semua
      </label>
      <button class="primary" onclick="addSelectedStudents()">➕ Tambah Terpilih</button>
    </div>
    <input type="text" id="addStudentSearch" placeholder="🔍 Cari siswa..." onkeyup="filterAddStudents()">
    <ul id="addStudentList"></ul>
    <div class="modal-actions">
      <button class="danger" onclick="document.getElementById('addStudentModal').classList.remove('active')">Tutup</button>
    </div>
  </div>
</div>

<div id="addTeacherModal" class="modal">
  <div class="modal-content">
    <h3>Pilih Guru</h3>
    <div class="bulk-actions">
      <label>
        <input type="checkbox" onclick="toggleAllAddTeachers(this)"> Pilih Semua
      </label>
      <button class="primary" onclick="addSelectedTeachers()">➕ Tambah Terpilih</button>
    </div>
    <input type="text" id="addTeacherSearch" placeholder="🔍 Cari guru..." onkeyup="filterAddTeachers()">
    <ul id="addTeacherList"></ul>
    <div class="modal-actions">
      <button class="danger" onclick="closeAddTeacherModal()">Tutup</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script type="module">
  import { loadLayout } from "/LMS/assets/js/components.js";
  window.loadLayout = loadLayout; 
</script>

<script type="module" src="./classes.js"></script>
</body>
</html>
