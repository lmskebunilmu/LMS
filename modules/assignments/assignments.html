<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Penugasan Siswa - Guru</title>

    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>

<body>
<div class="wrapper">

    <div id="sidebar-container"></div>

    <div class="main">

        <div id="header-container"></div>

        <div class="card">
            <h3>Panel Penugasan Materi & Latihan Siswa</h3>
            <p style="font-size: 13px; color: gray; margin-bottom: 20px;">
                Centang materi dan latihan yang ingin diaktifkan untuk kelas terpilih, lalu klik tombol simpan di setiap bab.
            </p>

            <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">Pilih Kelas:</label>
                    <select id="classSelect" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;"></select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">Filter Mata Pelajaran:</label>
                    <select id="subjectFilter" onchange="filterBySubject()" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                        <option value="">Semua Mapel</option>
                    </select>
                </div>
            </div>

            <input 
                type="text"
                id="searchAssignmentGuru"
                placeholder="Cari bab atau materi tugas..."
                oninput="filterAssignmentsGuru()"
                style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px;"
            >

            <div id="assignmentGuruList" class="material-container"></div>

        </div>

    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="./assignments-guru.js"></script>
</body>
</html>
