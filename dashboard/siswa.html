<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Siswa</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
<style>
    @media (max-width: 768px) {
      /* Paksa kontainer sidebar bawaan html agar tidak memakan space desktop */
      #sidebar-container {
        display: none !important;
      }
      
      /* Pastikan elemen .sidebar di dalamnya (jika disuntik JS) juga ikut sembunyi */
      .sidebar {
        display: none !important;
      }

      /* Buat konten utama memenuhi layar HP Anda */
      .main {
        padding: 14px !important;
        width: 100% !important;
        margin-left: 0 !important;
      }

      /* Opsional: Merapikan header-container di hp agar tidak pecah */
      #header-container .header {
        padding: 12px 14px !important;
        flex-direction: row;
        justify-content: space-between;
      }
      
      .user-info span {
        display: none !important; /* Sembunyikan nama panjang user di HP */
      }
    }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- PROFILE SISWA -->
    <div class="profile-card">

      <img
        id="headerAvatarCard"
        class="profile-avatar"
        src="../assets/images/default-avatar.png"
      >

      <div class="profile-details">
        <h2 id="headerNameCard">Nama Siswa</h2>
        <p id="headerEmailCard">email@siswa.com</p>
      </div>

    </div>

    <!-- DASHBOARD -->
    <div class="card">
      <h3>Dashboard Siswa</h3>

      <div class="stats-grid">

        <div class="stat-card">
          <h4 id="totalMaterials">0</h4>
          <p>Materi</p>
        </div>

        <div class="stat-card">
          <h4 id="totalAssignments">0</h4>
          <p>Tugas</p>
        </div>

      </div>

    </div>

    <!-- KELAS & MAPEL -->
<div class="card">
  <h3>Kelas & Mata Pelajaran</h3>
  <div id="classContainer"></div>
</div>

    <!-- MENU -->
    <div class="card">

      <h3>Menu</h3>

<div class="menu-grid">

  <button onclick="goMaterialsSiswa()">
    📚 Materi
  </button>

  <button onclick="goAssignmentsSiswa()">
    📝 Tugas
  </button>

  <button onclick="logout()">
    🚪 Logout
  </button>

</div>

    </div>

  </div>

</div>

<script type="module" src="./siswaDashboard.js"></script>

</body>
</html>
