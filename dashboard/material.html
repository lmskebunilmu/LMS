<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Material Detail</title>

  <style>
body {
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

</style>
</head>

<body>

  <div class="container">

    <div class="topbar">
  <a class="back" href="javascript:history.back()">← Kembali</a>

  <button id="fsBtn" class="fs-btn" onclick="toggleFullscreen()">
    ⛶ Fullscreen
  </button>
</div>
    <div id="content" class="loading">
      Loading material...
    </div>

  </div>

  <script type="module">

    import { db } from "../firebase/firebase-config.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const id = new URLSearchParams(window.location.search).get("id");
    const container = document.getElementById("content");

    /* =========================
       RENDER CONTENT (SAMA DENGAN SUPERADMIN)
    ========================= */
    function generateContent(input) {

      let output = input || "";

      // =====================
      // YouTube
      // =====================
      output = output.replace(
        /(https?:\/\/(www\.)?(youtube\.com|youtu\.be)\/[^\s<]+)/g,
        (url) => {
          let videoId = "";
          if (url.includes("watch?v=")) videoId = url.split("watch?v=")[1].split("&")[0];
          else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];

          return `<iframe  src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
        }
      );

      // =====================
      // Google Drive
      // =====================
      output = output.replace(
        /https?:\/\/drive\.google\.com\/file\/d\/([^\/]+)\/view[^\s<]*/g,
        (match, fileId) => {
          return `<iframe  src="https://drive.google.com/file/d/${fileId}/preview"></iframe>`;
        }
      );

      // =====================
      // PDF
      // =====================
      output = output.replace(
        /(https?:\/\/[^\s<]+\.pdf)/g,
        (url) => `<iframe  src="${url}"></iframe>`
      );

      // remove script
      output = output.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "");

      return `
        <div class="card">
          ${output}
        </div>
      `;
    }

    /* =========================
       LOAD MATERIAL
    ========================= */
    async function loadMaterial() {

      if (!id) {
        container.innerHTML = `<div class="error">ID material tidak ditemukan</div>`;
        return;
      }

      try {

        const snap = await getDoc(doc(db, "materials", id));

        if (!snap.exists()) {
          container.innerHTML = `<div class="error">Material tidak ditemukan</div>`;
          return;
        }

        const data = snap.data();

        container.innerHTML = `
          <h1>${data.title || "Untitled"}</h1>
          <p><b>Chapter:</b> ${data.chapter || "-"}</p>
          <p><b>Sub Chapter:</b> ${data.subChapter || "-"}</p>
          <hr/>
          <div id="materialBody"></div>
        `;

        document.getElementById("materialBody").innerHTML =
          generateContent(data.content);

        // MathJax render
        if (window.MathJax) {
          MathJax.typeset();
        }

      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="error">Gagal memuat material</div>`;
      }
    }

    window.toggleFullscreen = function () {
  const el = document.documentElement;
  const btn = document.getElementById("fsBtn");

  if (!document.fullscreenElement) {
    el.requestFullscreen().then(() => {
      btn.innerText = "❌ Exit Fullscreen";
    });
  } else {
    document.exitFullscreen().then(() => {
      btn.innerText = "⛶ Fullscreen";
    });
  }
};

    document.addEventListener("fullscreenchange", () => {
  const btn = document.getElementById("fsBtn");
  if (!btn) return;

  if (document.fullscreenElement) {
    btn.innerText = "❌ Exit Fullscreen";
  } else {
    btn.innerText = "⛶ Fullscreen";
  }
});

    loadMaterial();

  </script>

  <!-- MathJax -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</body>
</html>
